<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zylstraquadrat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/lenis@1.3.23/dist/lenis.css"
    />
    <link rel="preload" as="image" href="assets/image_4.webp" type="image/webp" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="#" class="brand-mark" aria-label="Zur Startseite">
        <img
          src="assets/logo.svg"
          alt="Zylstraquadrat Logo"
          class="brand-mark__img"
        />
      </a>

      <div class="site-header__actions">
        <a href="#contact" class="site-header__cta"
          >Zylstra<span class="brand-square">2</span> kennenlernen</a
        >

        <button class="site-header__menu" aria-label="Menü öffnen">
          <span class="site-header__menu-icon">
            <span class="site-header__menu-line"></span>
            <span class="site-header__menu-line"></span>
            <span class="site-header__menu-line"></span>
          </span>
        </button>
      </div>
    </header>

    <main>
      <div class="hero-scroll-stack">
        <section
          data-slideshow="wrap"
          class="hero-showcase is-loading is-hidden"
        >
          <div class="hero-showcase__slider">
            <div class="hero-showcase__slider-list">
              <div
                data-slideshow="slide"
                class="hero-showcase__slide is-active"
              >
                <picture>
                  <source srcset="assets/image_4.webp" type="image/webp" />
                  <img
                    class="hero-showcase__slide-img"
                    src="assets/image_4.jpg"
                    alt=""
                    data-slideshow="parallax"
                    draggable="false"
                  />
                </picture>
              </div>

              <div data-slideshow="slide" class="hero-showcase__slide">
                <picture>
                  <source srcset="assets/image_5.webp" type="image/webp" />
                  <img
                    class="hero-showcase__slide-img"
                    src="assets/image_5.jpg"
                    alt=""
                    data-slideshow="parallax"
                    draggable="false"
                  />
                </picture>
              </div>

              <div data-slideshow="slide" class="hero-showcase__slide">
                <picture>
                  <source srcset="assets/image_13.webp" type="image/webp" />
                  <img
                    class="hero-showcase__slide-img"
                    src="assets/image_13.jpg"
                    alt=""
                    data-slideshow="parallax"
                    draggable="false"
                  />
                </picture>
              </div>

              <div data-slideshow="slide" class="hero-showcase__slide">
                <picture>
                  <source srcset="assets/image_8.webp" type="image/webp" />
                  <img
                    class="hero-showcase__slide-img"
                    src="assets/image_8.jpg"
                    alt=""
                    data-slideshow="parallax"
                    draggable="false"
                  />
                </picture>
              </div>

              <div data-slideshow="slide" class="hero-showcase__slide">
                <picture>
                  <source srcset="assets/image_9.webp" type="image/webp" />
                  <img
                    class="hero-showcase__slide-img"
                    src="assets/image_9.jpg"
                    alt=""
                    data-slideshow="parallax"
                    draggable="false"
                  />
                </picture>
              </div>
            </div>
          </div>

          <div class="intro-reveal">
            <div class="intro-reveal__wrap">
              <div class="intro-reveal__groups">
                <div class="intro-reveal__group is-clone">
                  <div class="intro-reveal__item">
                    <div class="intro-reveal__media">
                      <img
                        loading="eager"
                        src="assets/thumbs/image_8.jpg"
                        alt=""
                        class="intro-reveal__image"
                      />
                    </div>
                  </div>

                  <div class="intro-reveal__item">
                    <div class="intro-reveal__media">
                      <img
                        loading="eager"
                        src="assets/thumbs/image_9.jpg"
                        alt=""
                        class="intro-reveal__image"
                      />
                    </div>
                  </div>

                  <div class="intro-reveal__item">
                    <div class="intro-reveal__media">
                      <img
                        loading="eager"
                        src="assets/thumbs/image_4.jpg"
                        alt=""
                        class="intro-reveal__image"
                      />
                    </div>
                  </div>

                  <div class="intro-reveal__item">
                    <div class="intro-reveal__media">
                      <img
                        loading="eager"
                        src="assets/thumbs/image_5.jpg"
                        alt=""
                        class="intro-reveal__image"
                      />
                    </div>
                  </div>

                  <div class="intro-reveal__item">
                    <div class="intro-reveal__media">
                      <img
                        loading="eager"
                        src="assets/thumbs/image_13.jpg"
                        alt=""
                        class="intro-reveal__image"
                      />
                    </div>
                  </div>
                </div>

                <div class="intro-reveal__group is-offset">
                  <div class="intro-reveal__item">
                    <div class="intro-reveal__media">
                      <img
                        loading="eager"
                        src="assets/thumbs/image_8.jpg"
                        alt=""
                        class="intro-reveal__image is-shrunk"
                      />
                    </div>
                  </div>

                  <div class="intro-reveal__item">
                    <div class="intro-reveal__media">
                      <img
                        loading="eager"
                        src="assets/thumbs/image_9.jpg"
                        alt=""
                        class="intro-reveal__image is-shrunk"
                      />
                    </div>
                  </div>

                  <div class="intro-reveal__item">
                    <div class="intro-reveal__media is-scaling">
                      <img
                        loading="eager"
                        src="assets/image_4.jpg"
                        alt=""
                        class="intro-reveal__image"
                      />
                    </div>
                  </div>

                  <div class="intro-reveal__item">
                    <div class="intro-reveal__media">
                      <img
                        loading="eager"
                        src="assets/thumbs/image_5.jpg"
                        alt=""
                        class="intro-reveal__image is-shrunk"
                      />
                    </div>
                  </div>

                  <div class="intro-reveal__item">
                    <div class="intro-reveal__media">
                      <img
                        loading="eager"
                        src="assets/thumbs/image_13.jpg"
                        alt=""
                        class="intro-reveal__image is-shrunk"
                      />
                    </div>
                  </div>
                </div>
              </div>

              <div class="intro-reveal__fade"></div>
              <div class="intro-reveal__fade is-clone"></div>
            </div>
          </div>

          <div class="hero-showcase__content">
            <div class="hero-showcase__headline-wrap">
              <h1 class="hero-showcase__heading">
                Schön wohnen,<br />
                fachlich abgesichert
              </h1>
            </div>

            <div class="hero-showcase__info">
              <p class="hero-showcase__lead">
                Innenarchitektur, Planung und Bauleitung, verbunden mit der
                fachlichen Sicherheit eines Ingenieurbüros.
              </p>

              <div class="hero-showcase__cta-row">
                <a href="#contact" class="hero-showcase__cta is-filled"
                  >Zylstra<span class="brand-square">2</span> kennenlernen</a
                >
                <a href="#more" class="hero-showcase__cta">Projekte ansehen</a>
              </div>
            </div>

            <div class="hero-showcase__bottom">
              <div class="hero-showcase__nav">
                <div
                  data-slideshow="thumb"
                  class="hero-showcase__nav-btn is-active"
                >
                  <img
                    loading="eager"
                    src="assets/thumbs/image_4.jpg"
                    alt=""
                    class="intro-reveal__image"
                  />
                </div>

                <div data-slideshow="thumb" class="hero-showcase__nav-btn">
                  <img
                    loading="eager"
                    src="assets/thumbs/image_5.jpg"
                    alt=""
                    class="intro-reveal__image"
                  />
                </div>

                <div data-slideshow="thumb" class="hero-showcase__nav-btn">
                  <img
                    loading="eager"
                    src="assets/thumbs/image_13.jpg"
                    alt=""
                    class="intro-reveal__image"
                  />
                </div>

                <div data-slideshow="thumb" class="hero-showcase__nav-btn">
                  <img
                    loading="eager"
                    src="assets/thumbs/image_8.jpg"
                    alt=""
                    class="intro-reveal__image"
                  />
                </div>

                <div data-slideshow="thumb" class="hero-showcase__nav-btn">
                  <img
                    loading="eager"
                    src="assets/thumbs/image_9.jpg"
                    alt=""
                    class="intro-reveal__image"
                  />
                </div>
              </div>
            </div>
          </div>
        </section>

        <section id="more" class="page-panel">
          <div class="page-panel__inner">
            <h2>Projekte ansehen</h2>
          </div>
        </section>
      </div>

      <section id="contact" class="page-panel">
        <div class="page-panel__inner">
          <h2>Zylstra<span class="brand-square">2</span> kennenlernen</h2>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/CustomEase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
